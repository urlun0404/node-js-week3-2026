name: 作業自動測試

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json

      - name: 安裝依賴
        run: npm install

      - name: 執行測試
        run: npm test
